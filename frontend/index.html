<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groundwork — Workout Tracker</title>
  <link rel="manifest" href="/groundwork/manifest.json" />
  <meta name="theme-color" content="#4f6ef7" />
  <link rel="icon" href="/groundwork/icon-192.svg" type="image/svg+xml" />
  <!-- Apply data-theme before first paint to prevent flash of wrong theme -->
  <script>
    (function() {
      try {
        var t = localStorage.getItem('gw-theme');
        var resolved;
        if (t === 'dark') {
          resolved = 'dark';
        } else if (t === 'light') {
          resolved = 'light';
        } else {
          // 'system' or missing/invalid: follow OS preference
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', resolved);
      } catch(e) {}
    })();
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
